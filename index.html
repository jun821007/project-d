<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="出貨前設定">
  <meta name="mobile-web-app-capable" content="yes">
  <title>出貨前設定極簡中控台</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #000000;
      --btn-default: #333333;
      --btn-done: #4caf50;
      --text: #ffffff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    body {
      padding: max(16px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom));
    }

    .panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      height: 100%;
    }

    .shortcut-btn {
      border: 0;
      border-radius: 14px;
      background: var(--btn-default);
      color: var(--text);
      font-size: clamp(20px, 5.6vw, 30px);
      font-weight: 700;
      line-height: 1.2;
      min-height: 88px;
      width: 100%;
      text-align: center;
      cursor: pointer;
      transition: background-color 120ms ease;
      padding: 12px 10px;
    }

    .shortcut-btn.done {
      background: var(--btn-done);
    }

    .shortcut-btn:active {
      transform: scale(0.995);
    }
  </style>
</head>
<body>
  <main class="panel" id="buttonPanel"></main>

  <script>
    const BUTTONS = [
      { id: "icloud-space", label: "iCloud 空間", url: "App-prefs:root=CASTLE&path=STORAGE_AND_BACKUP" },
      { id: "airdrop", label: "AirDrop 設定", url: "App-prefs:root=General&path=AIRDROP_LINK" },
      { id: "airplay", label: "AirPlay 設定", url: "App-prefs:root=General&path=AirPlay" },
      { id: "bluetooth", label: "藍牙設定", url: "App-prefs:root=Bluetooth" },
      { id: "location", label: "定位服務", url: "App-prefs:root=Privacy&path=LOCATION" },
      { id: "keyboard", label: "鍵盤語系", url: "App-prefs:root=General&path=Keyboard" },
      { id: "telegram", label: "下載 Telegram", url: "itms-apps://apps.apple.com/tw/app/telegram-messenger/id686449807" }
    ];

    const STORAGE_KEY = "shipping-setup-progress-v1";
    const panel = document.getElementById("buttonPanel");

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (e) {
        return {};
      }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function renderButtons() {
      const state = loadState();
      panel.innerHTML = "";

      BUTTONS.forEach((item) => {
        const btn = document.createElement("button");
        const done = Boolean(state[item.id]);
        btn.type = "button";
        btn.className = done ? "shortcut-btn done" : "shortcut-btn";
        btn.dataset.id = item.id;
        btn.dataset.url = item.url;
        btn.textContent = done ? `${item.label} ✓` : item.label;
        panel.appendChild(btn);
      });
    }

    panel.addEventListener("click", (event) => {
      const target = event.target.closest(".shortcut-btn");
      if (!target) return;

      const id = target.dataset.id;
      const url = target.dataset.url;
      const state = loadState();

      state[id] = true;
      saveState(state);

      target.classList.add("done");
      if (!target.textContent.endsWith(" ✓")) {
        target.textContent += " ✓";
      }

      // Let users see immediate state change before leaving page.
      setTimeout(() => {
        window.location.href = url;
      }, 80);
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    renderButtons();
  </script>
</body>
</html>
